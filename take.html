<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clashe | Take</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="js/theme.js"></script>
    <script src="js/loader.js"></script>
    <link rel="icon" type="image/svg+xml" href="assets/clashly-favicon.svg?v=20260311a" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/loader.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/create.css" />
    <link rel="stylesheet" href="css/feed.css" />
    <link rel="stylesheet" href="css/take.css" />
    <link rel="stylesheet" href="css/share-modal.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body data-page="take" data-requires-auth="true" data-requires-profile="true">
    <header id="top-nav" class="top-nav"></header>

    <main class="app-main app-main--take">
      <section class="take-detail">
        <p id="take-state" class="feed-state">Loading take...</p>
        <section id="take-detail-stream"></section>

        <section id="ai-judge-panel" class="ai-judge" aria-label="AI Judge panel">
          <header class="ai-judge__head">
            <div>
              <p class="ai-judge__eyebrow">AI Judge</p>
              <h2 class="ai-judge__title">Debate analysis</h2>
            </div>
            <button type="button" class="btn btn--ghost ai-judge__trigger" id="ai-judge-trigger">
              Analyze with AI Judge
            </button>
          </header>

          <p id="ai-judge-status" class="ai-judge__status" hidden></p>

          <div id="ai-judge-loading" class="ai-judge__loading" hidden aria-hidden="true">
            <span class="ai-judge__loading-line ai-judge__loading-line--lg"></span>
            <span class="ai-judge__loading-line"></span>
            <span class="ai-judge__loading-line ai-judge__loading-line--sm"></span>
          </div>

          <article id="ai-judge-result" class="ai-judge__result" hidden></article>
        </section>

        <section class="comments-shell" aria-label="Comments section">
          <header class="comments-shell__head">
            <div class="comments-shell__title">
              <p class="comments-shell__eyebrow">Comments</p>
              <h2><span id="comments-total">0</span> comments</h2>
            </div>
            <label class="comments-sort">
              <span>Sort</span>
              <select id="comments-sort">
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
              </select>
            </label>
          </header>

          <p id="comments-state" class="feed-state">Loading comments...</p>
          <section id="comments-thread" class="comments-thread" aria-label="Take comments"></section>

          <form id="comment-form" class="comment-compose" novalidate>
            <div class="comment-compose__head">
              <div>
                <p class="comment-compose__title">Join the debate</p>
                <p class="comment-compose__subtitle">Drop a direct response or jump into a side thread.</p>
              </div>
            </div>
            <div class="comment-compose__replying" id="comment-replying" hidden>
              <span id="comment-replying-text">Replying</span>
              <button type="button" class="comment-compose__cancel" id="comment-cancel-reply">Cancel</button>
            </div>
            <label class="comment-compose__field" for="comment-input">
              <textarea
                id="comment-input"
                name="comment"
                rows="1"
                placeholder="Write a comment..."
                required
              ></textarea>
            </label>
            <footer class="comment-compose__footer">
              <span class="comment-compose__count" id="comment-count">0</span>
              <button type="submit" class="btn btn--primary" id="comment-submit">Post</button>
            </footer>
          </form>
        </section>
      </section>
    </main>

    <nav id="bottom-nav" class="bottom-nav" aria-label="Mobile navigation"></nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="js/ux-animations.js"></script>
    <script src="js/env.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/profile-service.js"></script>
    <script src="js/notifications-service.js"></script>
    <script src="js/session.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/categories-service.js"></script>
    <script src="js/takes-service.js"></script>
    <script src="js/take-renderer.js"></script>
    <script src="js/comments-service.js"></script>
    <script src="js/comments-renderer.js"></script>
    <script src="js/ai-judge-service.js"></script>
    <script src="js/share-modal.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages/take.js"></script>
  </body>
</html>
