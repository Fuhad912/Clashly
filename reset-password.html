<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clashe | Reset password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="js/theme.js"></script>
    <script src="js/loader.js"></script>
    <link rel="icon" type="image/svg+xml" href="assets/clashly-favicon.svg?v=20260311a" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/loader.css" />
    <link rel="stylesheet" href="css/reset-password.css" />
  </head>
  <body data-page="reset-password" class="reset-page">
    <main class="reset-main">
      <section class="reset-card">
        <div class="reset-logo" aria-hidden="true">
          <img src="assets/clashly-mark.svg" alt="" />
        </div>
        <p class="reset-eyebrow">Account security</p>
        <h1 class="reset-title">Set a new password</h1>
        <p class="reset-copy">Use at least 8 characters. Keep it unique and not reused on other accounts.</p>

        <form id="reset-form" class="reset-form" novalidate>
          <label class="field-label" for="reset-password">New password</label>
          <div class="reset-password-field">
            <input id="reset-password" name="password" type="password" autocomplete="new-password" required />
            <button
              class="reset-password-toggle"
              type="button"
              data-toggle-password="reset-password"
              aria-label="Show password"
            >
              <svg class="reset-password-toggle__icon reset-password-toggle__icon--show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.8-6 10-6 10 6 10 6-3.8 6-10 6S2 12 2 12Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="reset-password-toggle__icon reset-password-toggle__icon--hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 3l18 18"></path>
                <path d="M10.6 10.7A3 3 0 0 0 13.3 13.4"></path>
                <path d="M9.9 5.2A10.7 10.7 0 0 1 12 5c6.2 0 10 7 10 7a17.2 17.2 0 0 1-4 4.7"></path>
                <path d="M6.6 6.7A17 17 0 0 0 2 12s3.8 7 10 7a10.6 10.6 0 0 0 4-.8"></path>
              </svg>
            </button>
          </div>

          <label class="field-label" for="reset-confirm-password">Confirm new password</label>
          <div class="reset-password-field">
            <input
              id="reset-confirm-password"
              name="confirm_password"
              type="password"
              autocomplete="new-password"
              required
            />
            <button
              class="reset-password-toggle"
              type="button"
              data-toggle-password="reset-confirm-password"
              aria-label="Show confirmed password"
            >
              <svg class="reset-password-toggle__icon reset-password-toggle__icon--show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.8-6 10-6 10 6 10 6-3.8 6-10 6S2 12 2 12Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="reset-password-toggle__icon reset-password-toggle__icon--hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 3l18 18"></path>
                <path d="M10.6 10.7A3 3 0 0 0 13.3 13.4"></path>
                <path d="M9.9 5.2A10.7 10.7 0 0 1 12 5c6.2 0 10 7 10 7a17.2 17.2 0 0 1-4 4.7"></path>
                <path d="M6.6 6.7A17 17 0 0 0 2 12s3.8 7 10 7a10.6 10.6 0 0 0 4-.8"></path>
              </svg>
            </button>
          </div>

          <p id="reset-status" class="status-message" hidden></p>

          <button id="reset-submit" class="btn btn--primary btn--block" type="submit">Update password</button>
          <a class="reset-back" href="auth.html">Back to login</a>
        </form>
      </section>
    </main>

    <footer class="app-legal-footer" aria-label="Legal links">
      <a href="terms.html">Terms of Service</a>
      <span aria-hidden="true">•</span>
      <a href="privacy.html">Privacy Policy</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="js/ux-animations.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/env.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/pages/reset-password.js"></script>
  </body>
</html>
