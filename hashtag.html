<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clashe | Hashtag</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="js/pwa-capture.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/loader.js"></script>
    <link rel="icon" type="image/svg+xml" href="assets/clashly-favicon.svg?v=20260311a" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/pwa-192.png" />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Clashe" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/loader.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/create.css" />
    <link rel="stylesheet" href="css/feed.css" />
    <link rel="stylesheet" href="css/hashtag.css" />
    <link rel="stylesheet" href="css/comments-modal.css" />
    <link rel="stylesheet" href="css/share-modal.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body data-page="hashtag" data-requires-auth="true" data-requires-profile="true">
    <header id="top-nav" class="top-nav"></header>

    <main class="app-main app-main--home">
      <section class="feed-column">
        <nav class="hashtag-navline" aria-label="Hashtag navigation">
          <a id="hashtag-back-link" class="hashtag-back-link" href="search.html">
            <span aria-hidden="true">&larr;</span>
            <span>Search</span>
          </a>
        </nav>

        <header class="feed-head hashtag-head">
          <div class="feed-head__inner hashtag-head__inner">
            <div class="hashtag-head__top">
              <span class="hashtag-head__glyph" aria-hidden="true">#</span>
              <div class="hashtag-head__copy">
                <p class="section-kicker">Hashtag feed</p>
                <h1 id="hashtag-title" class="page-title">#hashtag</h1>
                <p id="hashtag-subtitle" class="section-subtitle">Takes tagged with this hashtag.</p>
              </div>
            </div>
            <button type="button" id="hashtag-copy-link" class="hashtag-copy-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M10.6 13.4 8.5 15.5a3 3 0 1 1-4.2-4.2l2.1-2.1"></path>
                <path d="M13.4 10.6 15.5 8.5a3 3 0 1 1 4.2 4.2l-2.1 2.1"></path>
                <path d="m9 15 6-6"></path>
              </svg>
              <span data-copy-label>Copy link</span>
            </button>
          </div>
        </header>

        <section id="hashtag-pulse" class="hashtag-pulse" hidden>
          <div class="hashtag-pulse__copy">
            <p class="hashtag-pulse__eyebrow">Live pulse</p>
            <h2 id="hashtag-pulse-title">Tag activity</h2>
            <p id="hashtag-pulse-line">Fresh takes and reactions tagged here.</p>
          </div>
          <div id="hashtag-pulse-stats" class="hashtag-pulse__stats" aria-label="Hashtag stats"></div>
        </section>

        <div id="hashtag-related" class="hashtag-related" hidden>
          <p class="hashtag-related__label">Related tags</p>
          <div id="hashtag-related-chips" class="hashtag-related__chips"></div>
        </div>

        <div class="hashtag-tabs" role="tablist" aria-label="Sort takes">
          <button type="button" class="hashtag-tab is-active" data-hashtag-tab="new" role="tab" aria-selected="true">Newest</button>
          <button type="button" class="hashtag-tab" data-hashtag-tab="trending" role="tab" aria-selected="false">Trending</button>
          <button type="button" class="hashtag-tab" data-hashtag-tab="controversial" role="tab" aria-selected="false">Heated</button>
        </div>

        <p id="hashtag-feed-state" class="feed-state">Loading takes...</p>
        <section id="hashtag-feed-stream" class="feed-stream" aria-label="Hashtag take feed"></section>
      </section>
    </main>

    <nav id="bottom-nav" class="bottom-nav" aria-label="Mobile navigation"></nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="js/ux-animations.js"></script>
    <script src="js/env.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/profile-service.js"></script>
    <script src="js/notifications-service.js"></script>
    <script src="js/session.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/personalization-service.js"></script>
    <script src="js/categories-service.js"></script>
    <script src="js/takes-service.js"></script>
    <script src="js/take-renderer.js"></script>
    <script src="js/comments-service.js"></script>
    <script src="js/comments-renderer.js"></script>
    <script src="js/comments-modal.js"></script>
    <script src="js/share-modal.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages/hashtag.js"></script>
  </body>
</html>
