<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clashe | Explore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="js/theme.js"></script>
    <script src="js/loader.js"></script>
    <link rel="icon" type="image/svg+xml" href="assets/clashly-favicon.svg?v=20260311a" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/loader.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/feed.css" />
    <link rel="stylesheet" href="css/create.css" />
    <link rel="stylesheet" href="css/explore.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body data-page="explore" data-requires-auth="true" data-requires-profile="true">
    <header id="top-nav" class="top-nav"></header>

    <main class="app-main app-main--search">
      <section class="explore-shell">
        <header class="explore-hero">
          <div class="explore-hero__copy">
            <p class="section-kicker">Explore</p>
            <h1 class="page-title">Move by category, then enter the debate.</h1>
            <p class="section-subtitle">
              Real category lanes from the live floor, ranked by how much posting they are pulling right now.
            </p>
          </div>
          <div class="explore-hero__actions">
            <a class="explore-hero__link" href="search.html">Open search</a>
          </div>
        </header>

        <p id="explore-state" class="feed-state">Loading categories...</p>
        <section id="explore-categories" class="explore-grid" aria-label="Explore categories"></section>
      </section>
    </main>

    <nav id="bottom-nav" class="bottom-nav" aria-label="Mobile navigation"></nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="js/ux-animations.js"></script>
    <script src="js/env.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/profile-service.js"></script>
    <script src="js/notifications-service.js"></script>
    <script src="js/session.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/categories-service.js"></script>
    <script src="js/takes-service.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages/explore.js"></script>
  </body>
</html>
